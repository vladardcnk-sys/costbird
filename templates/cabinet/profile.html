{% extends "base.html" %}
{% block title %}Профиль{% endblock %}
{% block content %}
<div class="cab-wrap">
  <aside class="sidebar">
    <a href="/" class="auth-logo" style="margin-bottom:2rem">
      <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 16 16" fill="white"><path d="M14 2C14 2 10 1 7 4C4 7 3 11 3 13C3 13 5 11 7.5 11C10 11 11 13 11 13C11 13 13 8 14 2Z"/></svg></div>
      CostBird
    </a>
    <nav class="side-nav">
      <a href="/cabinet" class="side-link">📊 Дашборд</a>
      <a href="/cabinet/expenses" class="side-link">💰 Расходы</a>
      <a href="/cabinet/connect" class="side-link">🔌 Подключить МП</a>
      <a href="/cabinet/profile" class="side-link active">👤 Профиль</a>
    </nav>
    <a href="/auth/logout" class="side-link" style="margin-top:auto;color:var(--muted)">↩ Выйти</a>
  </aside>
  <main class="cab-main">
    <div class="cab-header"><h1 class="cab-title">👤 Профиль</h1><p class="cab-sub">{{ user.name }} · {{ user.email }}</p></div>
    <div class="empty-state"><div class="empty-icon">⚙️</div><h3>Настройки профиля</h3><p>Здесь будут настройки аккаунта, уведомлений и подписки.</p></div>
  </main>
</div>
{% endblock %}
