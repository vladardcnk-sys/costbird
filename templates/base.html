<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CostBird{% endblock %} — расходы маркетплейсов в одном API</title>
<meta name="description" content="{% block description %}Подключите один API и получайте данные о расходах с Ozon, Wildberries и Яндекс Маркет{% endblock %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="white">
        <path d="M14 2C14 2 10 1 7 4C4 7 3 11 3 13C3 13 5 11 7.5 11C10 11 11 13 11 13C11 13 13 8 14 2Z"/>
      </svg>
    </div>
    CostBird
  </a>
  <div class="nav-links">
    <a href="/#features">Возможности</a>
    <a href="/#demo">Демо</a>
    <a href="/pricing">Тарифы</a>
    <a href="/docs">Документация</a>
  </div>
  <a href="/#cta" class="nav-cta">Получить доступ</a>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <a href="/" class="logo" style="font-size:1rem">
    <div class="logo-mark" style="width:26px;height:26px;border-radius:6px">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="white">
        <path d="M14 2C14 2 10 1 7 4C4 7 3 11 3 13C3 13 5 11 7.5 11C10 11 11 13 11 13C11 13 13 8 14 2Z"/>
      </svg>
    </div>
    CostBird
  </a>
  <span>© 2024 CostBird</span>
  <a href="mailto:hello@costbird.ru">hello@costbird.ru</a>
</footer>

<canvas id="bg-canvas"></canvas>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
